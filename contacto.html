<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script src="js/yaavs-theme.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Contacta a YAAVS: teléfono, correo, WhatsApp y formulario.">
  <title>Contacto | YAAVS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="decorations.css">
  <link rel="stylesheet" href="theme-light.css">
  <link rel="stylesheet" href="theme-day-night.css">
  <link rel="stylesheet" href="interior-corporate.css">
  <link rel="icon" href="assets/yaavs-logo.png" type="image/png">
</head>
<body class="theme-cluster page-contacto" data-page="contacto">
  <div id="site-header"></div>

  <main id="contenido">
    <section class="avisos-hero-banner page-hero-banner contacto-hero-banner" id="contacto-hero" aria-label="Contacto YAAVS">
      <div class="avisos-hero-banner__aurora" aria-hidden="true"></div>
      <div class="avisos-hero-banner__media" data-page-banner-media></div>
      <div class="avisos-hero-banner__scan" aria-hidden="true"></div>
      <div class="avisos-hero-banner__shade" aria-hidden="true"></div>
      <div class="avisos-hero-banner__grid" aria-hidden="true"></div>
      <div class="avisos-hero-banner__content container">
        <nav class="breadcrumb avisos-hero-banner__breadcrumb" aria-label="Ruta">
          <a href="index.html">Inicio</a><span>/</span><span>Contacto</span>
        </nav>
        <p class="avisos-hero-banner__eyebrow">Estamos para ayudarte</p>
        <h1 class="avisos-hero-banner__title">
          <span class="avisos-hero-banner__accent">Contacto</span>
        </h1>
        <p class="avisos-hero-banner__lead">
          Afiliación Yaavser, vacantes Yaavstar o dudas operativas — elige el canal que prefieras.
        </p>
        <a href="#escribenos" class="scroll-hint scroll-hint--contacto" aria-label="Ir al formulario">
          <span class="scroll-hint-line"></span>
          <span class="scroll-hint-label">Escríbenos</span>
        </a>
      </div>
      <div class="avisos-hero-banner__rule" aria-hidden="true"></div>
    </section>

    <div class="pleca pleca--bridge" aria-hidden="true">
      <span class="pleca__line"></span>
      <span class="pleca__label">Canales directos</span>
      <span class="pleca__line"></span>
    </div>

    <section class="section section--contact" id="escribenos" aria-label="Formulario y canales">
      <div class="container contact-grid">
        <ul class="contact-cards">
          <li class="glass-card contact-card">
            <span>Teléfono</span>
            <a href="tel:+525522331210">55 22 33 12 10</a>
          </li>
          <li class="glass-card contact-card">
            <span>Correo</span>
            <a href="mailto:Hola@yaavs.com.mx">Hola@yaavs.com.mx</a>
          </li>
          <li class="glass-card contact-card">
            <span>WhatsApp</span>
            <a href="https://wa.me/525522331210" target="_blank" rel="noopener noreferrer">Enviar mensaje</a>
          </li>
        </ul>
        <form class="glass-card contact-form" id="contact-form" novalidate>
          <h3 class="form-title">Escríbenos</h3>
          <label class="field"><span>Nombre</span><input type="text" name="nombre" required autocomplete="name"></label>
          <label class="field"><span>Correo o teléfono</span><input type="text" name="contacto" required></label>
          <label class="field"><span>Asunto</span>
            <select name="asunto" id="contact-asunto">
              <option value="Ser Yaavser">Ser Yaavser</option>
              <option value="Ser Yaavstar">Ser Yaavstar</option>
              <option value="Servicios">Servicios</option>
              <option value="Otro">Otro</option>
            </select>
          </label>
          <label class="field"><span>Mensaje</span><textarea name="mensaje" rows="4" required></textarea></label>
          <button type="submit" class="btn btn--primary">Enviar</button>
          <p class="form-hint" id="contact-status" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
  <script src="js/interior-banners.config.js"></script>
  <script src="js/interior-banner.js"></script>
</body>
</html>
