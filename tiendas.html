<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script src="js/yaavs-theme.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563b5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Selecciona una compania YAAVS y entra al mapa de tiendas por ubicacion en Mexico.">
  <title>Conoce nuestras tiendas | YAAVS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=90">
  <link rel="stylesheet" href="decorations.css">
  <link rel="stylesheet" href="theme-light.css?v=5">
  <link rel="stylesheet" href="theme-day-night.css?v=4">
  <link rel="stylesheet" href="interior-corporate.css?v=8">
  <link rel="stylesheet" href="interior-light.css?v=2">
  <link rel="stylesheet" href="tiendas-page.css?v=4">
  <link rel="icon" href="assets/favicon-yaavs.png?v=2" type="image/png">
</head>
<body class="theme-cluster page-tiendas" data-page="tiendas">
  <div id="site-header"></div>

  <main id="contenido" class="tiendas-view" aria-label="Companias con cobertura nacional">
    <section class="tiendas-strips" aria-label="Companias YAAVS">
      <a class="tiendas-strip tiendas-strip--bait" href="tiendas-mapa.html?carrier=bait" aria-label="Abrir mapa de tiendas BAIT">
        <img class="tiendas-strip__logo" src="assets/operadores/bait-carriers.svg" alt="BAIT" width="320" height="128" loading="lazy" decoding="async">
        <span class="tiendas-strip__hint">Ver tiendas</span>
      </a>

      <a class="tiendas-strip tiendas-strip--att" href="tiendas-mapa.html?carrier=att" aria-label="Abrir mapa de tiendas AT&amp;T">
        <img class="tiendas-strip__logo" src="assets/operadores/att-carriers.png" alt="AT&amp;T" width="320" height="128" loading="lazy" decoding="async">
        <span class="tiendas-strip__hint">Ver tiendas</span>
      </a>
    </section>
  </main>

  <script src="js/layout.js?v=7"></script>
  <script src="js/main.js"></script>
</body>
</html>
